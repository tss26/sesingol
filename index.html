<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Singolarità - Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="date"], input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 100px; font-family: monospace; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #risultati { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 6px; display: none; }
        .match-0, .match-1 { color: #7f8c8d; }
        .match-2 { color: #27ae60; font-weight: bold; }
        .match-3, .match-4, .match-5, .match-6 { color: #e74c3c; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Tester Combinazioni</h1>
    
    <div class="form-group">
        <label for="dataEstrazione">Data Estrazione:</label>
        <input type="date" id="dataEstrazione">
    </div>

    <div class="form-group">
        <label for="numeriEstratti">I 6 Numeri Estratti (separati da spazio):</label>
        <input type="text" id="numeriEstratti" placeholder="Es: 12 45 67 71 88 90">
    </div>

    <div class="form-group">
        <label for="combinazioniGiocate">Le Tue Combinazioni (una sestina per riga):</label>
        <textarea id="combinazioniGiocate" placeholder="10 23 44 50 61 72&#10;5 12 45 66 71 88"></textarea>
    </div>

    <button onclick="analizzaRisultati()">Analizza Singolarità</button>

    <div id="risultati"></div>
</div>

<script src="app.js"></script>

</body>
</html>
